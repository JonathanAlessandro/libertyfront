<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Cliente</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <h1>Cadastro de Cliente</h1>
    <form id="cadastroForm">
      <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" name="telefone">
      </div>

      <div class="form-group">
        <label>Tipo de Documento:</label>
        <div class="radio-group">
          <label>
            <input type="radio" name="tipoDocumento" value="cpf" checked onchange="toggleDocumento()">
            CPF
          </label>
          <label>
            <input type="radio" name="tipoDocumento" value="cnpj" onchange="toggleDocumento()">
            CNPJ
          </label>
        </div>
      </div>

      <div class="form-group" id="cpfGroup">
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00">
      </div>

      <div class="form-group" id="cnpjGroup" style="display: none;">
        <label for="cnpj">CNPJ:</label>
        <input type="text" id="cnpj" name="cnpj" placeholder="00.000.000/0000-00">
      </div>

      <div class="form-group">
        <label for="plano_atual">Plano Atual:</label>
        <input type="text" id="plano_atual" name="plano_atual" required>
      </div>

      <div class="form-group">
        <label for="idades">Idades dos Participantes (separadas por vírgula):</label>
        <input type="text" id="idades" name="idades" placeholder="10, 20, 30" required>
      </div>

      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="aceitaEmails" name="aceitaEmails">
          Aceita receber e-mails
        </label>
      </div>

      <button type="submit" id="submitBtn">Cadastrar</button>
    </form>

    <div id="message" class="message" style="display: none;"></div>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
